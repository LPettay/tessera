name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages source must be set to "GitHub Actions" — see ADR 0015. Configure once with:
#   gh api -X PUT /repos/LPettay/tessera/pages -f build_type=workflow

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; in-flight runs aren't cancelled because a
# half-finished deploy can leave the URL in an odd state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Build examples
        run: bun run build:examples
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
