name: auto-merge

# Merges PRs labelled "type: story" or "type: task" once the hygiene check
# passes. Feature PRs (type: feature) are excluded — they require human review.
#
# Trigger: when the "check" workflow completes successfully on a PR branch.
# This avoids needing branch-protection rules while still gating on CI.

on:
  workflow_run:
    workflows: ["check"]
    types: [completed]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge eligible PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          REPO="${{ github.repository }}"

          # Find the open PR whose head matches this commit.
          PR=$(gh pr list \
            --repo "$REPO" \
            --state open \
            --json number,headRefOid,labels \
            --jq ".[] | select(.headRefOid == \"$SHA\")")

          if [ -z "$PR" ]; then
            echo "No open PR found for $SHA — skipping"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR" | jq -r '.number')
          LABELS=$(echo "$PR" | jq -r '.labels[].name')

          if echo "$LABELS" | grep -qE "^type: (story|task)$"; then
            echo "Merging PR #$PR_NUMBER (story/task label found)"
            gh pr merge "$PR_NUMBER" \
              --repo "$REPO" \
              --squash \
              --delete-branch
          else
            echo "PR #$PR_NUMBER has no story/task label — skipping"
          fi
