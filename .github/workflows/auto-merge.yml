name: auto-merge

# Automatically merges PRs labelled "type: story" or "type: task" once all
# required CI checks pass. Feature PRs (type: feature) are excluded and
# require human review.
#
# Trigger: whenever a PR is opened, labeled, or new commits are pushed.

on:
  pull_request:
    types: [opened, labeled, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only run if the PR carries a story or task label.
    if: |
      contains(github.event.pull_request.labels.*.name, 'type: story') ||
      contains(github.event.pull_request.labels.*.name, 'type: task')
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Enable auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --auto \
            --squash
